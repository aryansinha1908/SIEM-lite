server {
    listen 80;
    
    # 1. Serve the React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to the Backend container
    location /api/ {
        # 'backend' is the service name from your docker-compose.yml
        # In production, you can change this to your real backend IP/URL
        proxy_pass http://backend:3000/api/v1; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
